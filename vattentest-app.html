<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Vattenkollen Värmdö</title>
</head>
<body class="bg-gray-100">
    <div id="app" class="container mx-auto p-4">
        <h1 class="text-3xl font-bold text-center">Vattenkollen Värmdö</h1>
        <div id="map" class="h-96 w-full mb-4"></div>
        <button id="loadData" class="bg-blue-500 text-white px-4 py-2 rounded">Load Data</button>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide-icons/dist/lucide.umd.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBtQ7bcDV7y_zTdYw8gJT0KppF3R6EWINU",
            authDomain: "vattenkollen-varmdo.firebaseapp.com",
            databaseURL: "https://vattenkollen-varmdo-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vattenkollen-varmdo",
            storageBucket: "vattenkollen-varmdo.firebasestorage.app",
            messagingSenderId: "805928287283",
            appId: "1:805928287283:web:ddacd093914afaf89b7746",
            measurementId: "G-N4X9MSHFKV"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(app);

        // Leaflet map initialization
        const map = L.map('map').setView([59.3672, 18.3714], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        document.getElementById('loadData').addEventListener('click', function() {
            // Load data from Firebase
            database.ref('/waterdata').once('value').then((snapshot) => {
                const data = snapshot.val();
                console.log(data);
            });
        });
    </script>
</body>
</html>
